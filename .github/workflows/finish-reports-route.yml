name: Finish responsive reports route

on:
  push:
    branches:
      - agent/v3.11-mobile-reports
    paths:
      - .github/workflows/finish-reports-route.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-build-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/v3.11-mobile-reports
          fetch-depth: 0

      - name: Connect Reports workspace
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/app/App.jsx')
          text = path.read_text()

          import_anchor = "import { EmployeeWorkspace } from './components/EmployeeWorkspace';"
          report_import = "import { ReportsWorkspace } from './components/ReportsWorkspace';"
          if report_import not in text:
              if import_anchor not in text:
                  raise SystemExit('EmployeeWorkspace import anchor was not found.')
              text = text.replace(import_anchor, import_anchor + '\n' + report_import, 1)

          old_route = "else if(page==='reports') content=<ModulePlaceholder title=\"Reports\" description=\"Operations, proof-of-service, customer, financial, and employee performance reports.\"/>;"
          new_route = "else if(page==='reports') content=<ReportsWorkspace data={data}/>;"
          if old_route in text:
              text = text.replace(old_route, new_route, 1)
          elif new_route not in text:
              raise SystemExit('Reports route anchor was not found.')

          path.write_text(text)

      - name: Install dependencies
        run: npm ci

      - name: Build production application
        run: npm run build

      - name: Commit validated route connection
        run: |
          if git diff --quiet; then
            echo "Reports route was already connected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/App.jsx
          git commit -m "feat: connect responsive reports workspace"
          git push origin HEAD:agent/v3.11-mobile-reports
