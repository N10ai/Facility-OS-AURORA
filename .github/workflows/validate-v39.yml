name: Validate Aurora v3.9

on:
  push:
    branches:
      - feature/aurora-v3.9-role-workflows
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/aurora-v3.9-role-workflows
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate integration scripts
        run: |
          node --check scripts/apply-v39-role-workflows.mjs
          node --check scripts/apply-v39-employee-manager.mjs
      - name: Apply photo and inventory integration
        run: node scripts/apply-v39-role-workflows.mjs
      - name: Apply employee and manager integration
        run: node scripts/apply-v39-employee-manager.mjs
      - name: Commit integrated app
        run: |
          if git diff --quiet; then
            echo "No integration changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/app/App.jsx src/styles/app.css
            git commit -m "Integrate Aurora v3.9 role workflows"
            git push origin HEAD:feature/aurora-v3.9-role-workflows
          fi
      - name: Install dependencies from public npm
        run: |
          rm -f package-lock.json
          npm config set registry https://registry.npmjs.org/
          npm install --no-audit --no-fund --progress=false
      - name: Production build
        run: npm run build
