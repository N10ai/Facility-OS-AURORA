name: Validate Aurora v3.11

on:
  push:
    branches:
      - agent/aurora-v3.11-reports
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aurora-v3.11-reports
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate integration script
        run: node --check scripts/apply-v311-reports.mjs
      - name: Integrate reports workspace
        run: node scripts/apply-v311-reports.mjs
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm config set registry https://registry.npmjs.org/
          npm install --no-audit --no-fund --progress=false
      - name: Production build
        run: npm run build
      - name: Commit integrated release
        run: |
          if git diff --quiet; then
            echo "No integration changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/app/App.jsx package.json
            git commit -m "Integrate Aurora v3.11 reports workspace"
            git push origin HEAD:agent/aurora-v3.11-reports
          fi
