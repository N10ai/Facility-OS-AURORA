name: Integrate Aurora v3.13

on:
  push:
    branches:
      - agent/aurora-v3.13-customer-schedule
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate-and-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aurora-v3.13-customer-schedule
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply customer schedule integration
        run: node scripts/integrate-v3.13.mjs
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm config set registry https://registry.npmjs.org/
          npm install --no-audit --no-fund --progress=false
      - name: Production build
        run: npm run build
      - name: Commit integrated application
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/app/App.jsx package.json package-lock.json
            git commit -m "release: integrate Aurora v3.13.0"
            git push origin HEAD:agent/aurora-v3.13-customer-schedule
          fi
